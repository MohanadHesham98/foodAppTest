name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      DOCKER_USERNAME: mohanad898
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
      EC2_USER: ubuntu
      EC2_HOST: 44.222.81.4
      APP_PATH: ~/foodApp
      NAMESPACE: foodapp

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Build and push Backend image
        run: |
          docker build -t ${{ env.DOCKER_USERNAME }}/backend:latest ./Backend
          docker push ${{ env.DOCKER_USERNAME }}/backend:latest

      - name: Build and push Frontend image
        run: |
          docker build -t ${{ env.DOCKER_USERNAME }}/frontend:latest ./Frontend
          docker push ${{ env.DOCKER_USERNAME }}/frontend:latest

      - name: Build and push Admin image
        run: |
          docker build -t ${{ env.DOCKER_USERNAME }}/admin:latest ./Admin
          docker push ${{ env.DOCKER_USERNAME }}/admin:latest

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ env.EC2_HOST }}
          username: ${{ env.EC2_USER }}
          key: ${{ env.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            mkdir -p $HOME/.kube
            # Create namespace if not exists
            kubectl get namespace $NAMESPACE || kubectl create namespace $NAMESPACE
            # Apply all Kubernetes manifests
            kubectl apply -f $APP_PATH/k8s/mongodb -n $NAMESPACE
            kubectl apply -f $APP_PATH/k8s/backend -n $NAMESPACE
            kubectl apply -f $APP_PATH/k8s/admin -n $NAMESPACE
            kubectl apply -f $APP_PATH/k8s/frontend -n $NAMESPACE
            kubectl apply -f $APP_PATH/k8s/food-secrets.yaml -n $NAMESPACE
