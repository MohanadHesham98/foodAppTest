name: Build and Deploy to EC2 

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout the repo
      - name: Checkout Repository
        uses: actions/checkout@v3

      # Login to Docker Hub
      - name: Docker Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build and push Backend
      - name: Build & Push Backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/backend:latest ./Backend
          docker push ${{ secrets.DOCKER_USERNAME }}/backend:latest

      # Build and push Admin
      - name: Build & Push Admin
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/admin:latest ./Admin
          docker push ${{ secrets.DOCKER_USERNAME }}/admin:latest

      # Build and push Frontend
      - name: Build & Push Frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend:latest ./Frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend:latest

      # Deploy to EC2 using SSH
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p $HOME/.kube
            # Apply namespace
            kubectl get namespace foodapp || kubectl create namespace foodapp
            # Apply all Kubernetes manifests
            kubectl apply -f ~/foodApp/k8s/mongodb -n foodapp
            kubectl apply -f ~/foodApp/k8s/backend -n foodapp
            kubectl apply -f ~/foodApp/k8s/admin -n foodapp
            kubectl apply -f ~/foodApp/k8s/frontend -n foodapp
            kubectl apply -f ~/foodApp/k8s/food-secrets.yaml -n foodapp
