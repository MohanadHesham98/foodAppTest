name: Deploy FoodApp to K3s

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      APP_PATH: ~/foodApp
      NAMESPACE: foodapp

    steps:
      # 1️⃣ Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Docker login
      - name: Docker login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3️⃣ Build & push images
      - name: Build & Push Docker Images
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend:latest ./Frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend:latest
          docker build -t ${{ secrets.DOCKER_USERNAME }}/backend:latest ./Backend
          docker push ${{ secrets.DOCKER_USERNAME }}/backend:latest
          docker build -t ${{ secrets.DOCKER_USERNAME }}/admin:latest ./Admin
          docker push ${{ secrets.DOCKER_USERNAME }}/admin:latest

      # 4️⃣ SSH deploy to EC2
      - name: Deploy to K3s via SSH
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            mkdir -p $HOME/.kube 
            export APP_PATH=~/foodApp
            export NAMESPACE=foodapp
            kubectl get namespace $NAMESPACE || kubectl create namespace $NAMESPACE
            kubectl apply -f $APP_PATH/k8s/mongodb -n $NAMESPACE
            kubectl apply -f $APP_PATH/k8s/backend -n $NAMESPACE
            kubectl apply -f $APP_PATH/k8s/admin -n $NAMESPACE
            kubectl apply -f $APP_PATH/k8s/frontend -n $NAMESPACE
            kubectl apply -f $APP_PATH/k8s/food-secrets.yaml -n $NAMESPACE
            kubectl get pods -n $NAMESPACE
